<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purple Peregrine | SVG Cut Files for Cricut</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FDF8F4;
      font-family: Georgia, serif;
      cursor: none;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #stage {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #FDF8F4;
    }
    #paper {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      height: 100%;
      background: #EDE0D4;
      z-index: 10;
    }
    #cut-line {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 1px;
      height: 0px;
      background: rgba(98,56,94,0.22);
      transform: translateX(-50%);
      z-index: 11;
      pointer-events: none;
    }
    #scissors-wrap {
      position: absolute;
      left: 50%;
      bottom: -160px;
      transform: translateX(-50%);
      z-index: 30;
      width: 70px;
      height: 130px;
    }
    #brand {
      position: absolute;
      top: 44%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 5;
      opacity: 0;
      width: 90%;
    }
    #brand h1 {
      font-size: clamp(32px, 6vw, 62px);
      color: #62385e;
      font-weight: normal;
      letter-spacing: 0.15em;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    #brand p {
      font-size: 14px;
      color: #8a6080;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }
    #enter-btn {
      display: none;
      background: #62385e;
      color: #fff;
      border: none;
      padding: 14px 36px;
      font-size: 15px;
      font-family: Georgia, serif;
      letter-spacing: 0.08em;
      cursor: none;
      border-radius: 4px;
    }
    #enter-btn:hover { background: #4a2a46; }
    #logo-wrap {
      margin: 0 auto 16px;
      width: min(560px, 80vw);
    }
    #logo-wrap img {
      width: 100%;
      height: auto;
    }
    #progress {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #8a6080;
      letter-spacing: 0.2em;
      z-index: 25;
      transition: opacity 0.4s;
    }
    #cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-18px, -12px);
    }
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>

  const viewboxes = ["0 0 354.14407 707.8291","0 0 354.14355 673.4068","0 0 477.05582 582.75037","0 0 354.14355 673.4068"];
  const transforms = ["translate(139.03787,207.75)","translate(-333.35076,194.4682)","translate(-802.34177,105.6028)","translate(-333.35076,194.4682)"];

  let stateIdx = 0, animDone = false, mouseMoving = false;
  let mouseMoveTimer = null, cursorSnipInterval = null;

  document.addEventListener('mousemove', function(e) {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    if (!mouseMoving) {
      mouseMoving = true;
      cursorSnipInterval = setInterval(() => {
        stateIdx = (stateIdx + 1) % states.length;
        cursorSvg.setAttribute('viewBox', viewboxes[stateIdx]);
        cursorG.setAttribute('transform', transforms[stateIdx]);
        cursorPath.setAttribute('d', paths[stateIdx]);
      }, 200);
    }
    clearTimeout(mouseMoveTimer);
    mouseMoveTimer = setTimeout(() => {
      mouseMoving = false;
      clearInterval(cursorSnipInterval);
      cursorSnipInterval = null;
      stateIdx = 0;
      cursorSvg.setAttribute('viewBox', viewboxes[0]);
      cursorG.setAttribute('transform', transforms[0]);
      cursorPath.setAttribute('d', paths[0]);
    }, 150);
  });

  document.addEventListener('click', e => { if (animDone && !e.target.closest('a')) spawnConfetti(e.clientX, e.clientY); });

  function spawnConfetti(x, y) {
    const colors = ['#62385e','#4e2c4f','#ebdb43','#9b55bb','#EDE0D4','#9b6a96','#b06fd4'];
    for (let i = 0; i < 24; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      const size = 5 + Math.random() * 9;
      el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'}`;
      document.body.appendChild(el);
      const angle = Math.random() * Math.PI * 2;
      const dist = 60 + Math.random() * 130;
      el.animate([
        {transform:'translate(0,0) rotate(0deg)',opacity:1},
        {transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) rotate(${Math.random()*540}deg)`,opacity:0}
      ], {duration:700+Math.random()*500,easing:'ease-out'}).onfinish = () => el.remove();
    }
  }

  let scissorIdx = 0;
  setInterval(() => {
    scissorIdx = (scissorIdx + 1) % states.length;
    states.forEach((s,i) => s.style.opacity = i === scissorIdx ? '1' : '0');
  }, 220);

  function reveal() {
    const stage = document.getElementById('stage');
    const left = document.createElement('div');
    const right = document.createElement('div');
    left.style.cssText = 'position:absolute;left:0;top:0;width:50%;height:100%;background:#EDE0D4;z-index:12;';
    right.style.cssText = 'position:absolute;right:0;top:0;width:50%;height:100%;background:#EDE0D4;z-index:12;';
    paper.style.display = 'none';
    cutLine.style.display = 'none';
    stage.appendChild(left);
    stage.appendChild(right);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      left.style.transition = 'transform 1.1s cubic-bezier(0.7,0,0.2,1)';
      right.style.transition = 'transform 1.1s cubic-bezier(0.7,0,0.2,1)';
      left.style.transform = 'translateX(-110vw)';
      right.style.transform = 'translateX(110vw)';
      progress.style.opacity = '0';
      brand.style.transition = 'opacity 0.9s ease 0.5s';
      brand.style.opacity = '1';
      animDone = true;
      setTimeout(() => { enterBtn.style.display = 'inline-block'; }, 1500);
    }));
  }

  function runAnimation() {
    const totalDuration = 4500;
    const startTime = performance.now();
    const screenH = window.innerHeight;
    function step(now) {
      const pct = Math.min((now - startTime) / totalDuration, 1);
      const eased = pct * pct;
      const scissorBottom = -160 + (screenH + 200) * eased;
      scissorsWrap.style.bottom = scissorBottom + 'px';
      cutLine.style.height = Math.max(0, scissorBottom + 52) + 'px';
      if (pct < 1) { requestAnimationFrame(step); }
      else {
        scissorsWrap.style.transition = 'opacity 0.2s';
        scissorsWrap.style.opacity = '0';
        setTimeout(reveal, 200);
      }
    }
    requestAnimationFrame(step);
  }

  function enterSite() {
    spawnConfetti(window.innerWidth/2, window.innerHeight/2);
    setTimeout(() => {
      document.body.style.transition = 'opacity 0.6s';
      document.body.style.opacity = '0';
    }, 300);
    setTimeout(() => {
      window.location.href = 'homepage.html';
    }, 900);
  }

  window.addEventListener('load', runAnimation);
</script>
