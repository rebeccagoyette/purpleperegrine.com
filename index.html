<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purple Peregrine | SVG Cut Files for Cricut</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: #FDF8F4;
      font-family: Georgia, serif;
      cursor: none;
      overflow: hidden;
      height: 100vh;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    #mask-left {
      position: absolute;
      left: 0; top: 0;
      width: 50%;
      height: 100%;
      background: #F0E6DC;
      z-index: 10;
      transition: transform 1.4s cubic-bezier(0.77,0,0.18,1);
    }

    #mask-right {
      position: absolute;
      right: 0; top: 0;
      width: 50%;
      height: 100%;
      background: #F0E6DC;
      z-index: 10;
      transition: transform 1.4s cubic-bezier(0.77,0,0.18,1);
    }

    #cut-line {
      position: absolute;
      left: 50%;
      top: 0;
      width: 3px;
      height: 0%;
      background: repeating-linear-gradient(
        to bottom,
        #8B4A3C 0px, #8B4A3C 10px,
        transparent 10px, transparent 20px
      );
      z-index: 20;
      transform: translateX(-50%);
      transition: height 1.2s ease-in;
    }

    #scissors {
      position: absolute;
      left: 50%;
      top: -80px;
      transform: translateX(-50%);
      z-index: 30;
      transition: top 1.2s ease-in;
    }

    #brand {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 5;
      opacity: 0;
      transition: opacity 1s ease 0.5s;
    }

    #brand h1 {
      font-size: clamp(32px, 6vw, 56px);
      color: #8B4A3C;
      font-weight: normal;
      letter-spacing: 0.15em;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    #brand p {
      font-size: 14px;
      color: #9B7B72;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    #brand .badge {
      display: inline-block;
      border: 1px solid #C8A89A;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 12px;
      color: #8B4A3C;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
    }

    #enter-btn {
      display: none;
      background: #8B4A3C;
      color: #fff;
      border: none;
      padding: 14px 32px;
      font-size: 15px;
      font-family: Georgia, serif;
      letter-spacing: 0.06em;
      cursor: none;
      border-radius: 4px;
      transition: background 0.2s;
    }

    #enter-btn:hover { background: #6B3A2C; }

    #progress {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #9B7B72;
      letter-spacing: 0.15em;
      z-index: 20;
      transition: opacity 0.4s;
    }

    #cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-16px, -16px);
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }

    #peregrine {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      opacity: 0;
      transition: opacity 1s ease 0.8s;
    }
  </style>
</head>
<body>

<div id="stage">

  <div id="mask-left"></div>
  <div id="mask-right"></div>
  <div id="cut-line"></div>

  <div id="scissors">
    <svg id="scissors-svg" width="60" height="60" viewBox="0 0 48 48" fill="none">
      <circle cx="14" cy="36" r="8" stroke="#8B4A3C" stroke-width="2" fill="#FDF8F4"/>
      <circle cx="34" cy="36" r="8" stroke="#8B4A3C" stroke-width="2" fill="#FDF8F4"/>
      <circle cx="14" cy="36" r="3" fill="#8B4A3C"/>
      <circle cx="34" cy="36" r="3" fill="#8B4A3C"/>
      <line id="blade-left" x1="14" y1="28" x2="37" y2="6" stroke="#8B4A3C" stroke-width="2.5" stroke-linecap="round"/>
      <line id="blade-right" x1="34" y1="28" x2="11" y2="6" stroke="#8B4A3C" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="24" cy="18" r="2.5" fill="#FDF8F4"/>
    </svg>
  </div>

  <div id="brand">
    <div class="badge">✦ Official Cricut Design Space Contributor since 2023</div>
    <h1>PURPLE<br>PEREGRINE</h1>
    <p>SVG Cut Files for Paper Crafters & Cricut Enthusiasts</p>
    <br>
    <button id="enter-btn" onclick="enterSite()">Enter the studio →</button>
  </div>

  <svg id="peregrine" width="140" height="120" viewBox="0 0 140 120">
    <polygon points="70,8 82,32 104,18 90,42 118,38 96,54 108,76 80,64 70,92 60,64 32,76 44,54 22,38 50,42 36,18 58,32" fill="#6B2D8B" opacity="0.15"/>
    <polygon points="70,16 80,34 98,24 86,44 108,42 90,54 100,72 76,62 70,84 64,62 40,72 50,54 32,42 54,44 42,24 60,34" fill="#8B4A3C" opacity="0.15"/>
    <polygon points="70,12 78,30 94,20 83,42 104,40 86,53 95,70 72,61 70,80 68,61 45,70 54,53 36,40 57,42 46,20 62,30" fill="#7B3A9B" opacity="0.5"/>
    <polygon points="70,20 76,34 88,27 80,42 96,40 82,50 88,64 70,56 70,72 70,56 52,64 58,50 44,40 60,42 52,27 64,34" fill="#9B55BB" opacity="0.8"/>
    <polygon points="70,28 74,38 82,33 76,43 86,42 78,49 82,58 70,52 70,64 70,52 58,58 62,49 54,42 64,43 58,33 66,38" fill="#B06FD4" opacity="0.95"/>
    <circle cx="70" cy="26" r="5" fill="#E8C84A"/>
    <polygon points="70,22 73,26 70,30 67,26" fill="#3D2B26"/>
    <line x1="50" y1="48" x2="25" y2="65" stroke="#8B55AA" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="90" y1="48" x2="115" y2="65" stroke="#8B55AA" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="50" y1="48" x2="20" y2="80" stroke="#7B3A9B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="90" y1="48" x2="120" y2="80" stroke="#7B3A9B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </svg>

  <div id="progress">CUTTING...</div>

</div>

<div id="cursor">
  <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
    <circle cx="14" cy="36" r="8" stroke="#8B4A3C" stroke-width="2" fill="white"/>
    <circle cx="34" cy="36" r="8" stroke="#8B4A3C" stroke-width="2" fill="white"/>
    <circle cx="14" cy="36" r="3" fill="#8B4A3C"/>
    <circle cx="34" cy="36" r="3" fill="#8B4A3C"/>
    <line id="cur-left" x1="14" y1="28" x2="37" y2="6" stroke="#8B4A3C" stroke-width="2.5" stroke-linecap="round"/>
    <line id="cur-right" x1="34" y1="28" x2="11" y2="6" stroke="#8B4A3C" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="24" cy="18" r="2.5" fill="white"/>
  </svg>
</div>

<script>
  const stage = document.getElementById('stage');
  const maskL = document.getElementById('mask-left');
  const maskR = document.getElementById('mask-right');
  const cutLine = document.getElementById('cut-line');
  const scissorsEl = document.getElementById('scissors');
  const brand = document.getElementById('brand');
  const peregrine = document.getElementById('peregrine');
  const progress = document.getElementById('progress');
  const enterBtn = document.getElementById('enter-btn');
  const cursor = document.getElementById('cursor');
  const bladeLeft = document.getElementById('blade-left');
  const bladeRight = document.getElementById('blade-right');
  const curLeft = document.getElementById('cur-left');
  const curRight = document.getElementById('cur-right');

  let animDone = false;
  let scissorOpen = true;

  document.addEventListener('mousemove', function(e) {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  document.addEventListener('click', function(e) {
    if (animDone) spawnConfetti(e.clientX, e.clientY);
  });

  function spawnConfetti(x, y) {
    const colors = ['#8B4A3C','#A855C8','#E8C84A','#6B2D8B','#F5EDE6','#C8A89A','#B06FD4'];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.cssText = `left:${x}px;top:${y}px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'}`;
      document.body.appendChild(el);
      const angle = Math.random() * Math.PI * 2;
      const dist = 50 + Math.random() * 100;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      el.animate([
        {transform:'translate(0,0) rotate(0deg)', opacity:1},
        {transform:`translate(${tx}px,${ty}px) rotate(${Math.random()*540}deg)`, opacity:0}
      ], {duration: 700+Math.random()*500, easing:'ease-out'}).onfinish = () => el.remove();
    }
  }

  const scissorInterval = setInterval(() => {
    scissorOpen = !scissorOpen;
    const spread = scissorOpen ? 37 : 28;
    const spreadC = scissorOpen ? 11 : 20;
    bladeLeft.setAttribute('x2', spread);
    bladeRight.setAttribute('x2', spreadC);
    curLeft.setAttribute('x2', spread);
    curRight.setAttribute('x2', spreadC);
  }, 280);

  function runAnimation() {
    setTimeout(() => {
      cutLine.style.height = '100%';
      scissorsEl.style.top = (window.innerHeight - 80) + 'px';
      progress.textContent = 'SNIP SNIP...';
    }, 600);

    setTimeout(() => {
      clearInterval(scissorInterval);
      maskL.style.transform = 'translateX(-105%)';
      maskR.style.transform = 'translateX(105%)';
      brand.style.opacity = '1';
      peregrine.style.opacity = '1';
      progress.style.opacity = '0';
      scissorsEl.style.opacity = '0';
      cutLine.style.opacity = '0';
      animDone = true;
      setTimeout(() => {
        enterBtn.style.display = 'inline-block';
      }, 800);
    }, 2000);
  }

  function enterSite() {
    spawnConfetti(window.innerWidth/2, window.innerHeight/2);
    setTimeout(() => {
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.5s';
    }, 300);
  }

  window.addEventListener('load', runAnimation);
</script>

</body>
</html>
