    * { box-sizing: border-box; margin: 0; padding: 0; }
    a, button { cursor: none !important; }
    body {
      background: #FDF8F4;
      font-family: 'Georgia', serif;
      cursor: none;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #stage {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #FDF8F4;
    }
    #paper {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      height: 100%;
      background: #EDE0D4;
      z-index: 10;
    }
    #cut-line {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 1px;
      height: 0px;
      background: rgba(98,56,94,0.22);
      transform: translateX(-50%);
      z-index: 11;
      pointer-events: none;
    }
    #scissors-wrap {
      position: absolute;
      left: 50%;
      bottom: -160px;
      transform: translateX(-50%);
      z-index: 30;
      width: 70px;
      height: 130px;
    }

    /* Brand block — logo + text stacked, centered */
    #brand {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 5;
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 90%;
    }
    #brand img {
      width: clamp(300px, 42vw, 580px);
      height: auto;
    }
    #brand h1 {
      font-size: clamp(42px, 8vw, 88px);
      color: #62385e;
      font-weight: normal;
      letter-spacing: 0.18em;
      line-height: 1.2;
    }
    #brand p {
      font-size: clamp(13px, 1.8vw, 18px);
      color: #8a6080;
      letter-spacing: 0.12em;
    }

    #progress {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #8a6080;
      letter-spacing: 0.2em;
      z-index: 25;
      transition: opacity 0.4s;
    }
    #cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-12px, -8px);
      transition: opacity 0.2s ease;
    }
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }

    @media (max-width: 768px) {
      #cursor { display: none !important; }
      body { cursor: auto; }
      a, button { cursor: pointer !important; }
    }
  </style>

  const viewboxes = ["0 0 354.14407 707.8291","0 0 354.14355 673.4068","0 0 477.05582 582.75037","0 0 354.14355 673.4068"];
  const transforms = ["translate(139.03787,207.75)","translate(-333.35076,194.4682)","translate(-802.34177,105.6028)","translate(-333.35076,194.4682)"];

  let stateIdx = 0, mouseMoving = false;
  let mouseMoveTimer = null, cursorSnipInterval = null;
  let lastX = null, lastY = null, currentAngle = 0;

  function updateCursorRotation(x, y) {
    if (lastX !== null && lastY !== null) {
      const dx = x - lastX, dy = y - lastY;
      if (Math.sqrt(dx*dx+dy*dy) > 3) currentAngle = Math.atan2(dy, dx) * (180/Math.PI) + 90;
    }
    lastX = x; lastY = y;
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
    cursor.style.transform = `translate(-12px, -8px) rotate(${currentAngle}deg)`;
  }

  document.addEventListener('mousemove', function(e) {
    updateCursorRotation(e.clientX, e.clientY);
    cursor.style.opacity = '1';
    if (!mouseMoving) {
      mouseMoving = true;
      cursorSnipInterval = setInterval(() => {
        stateIdx = (stateIdx+1) % states.length;
        cursorSvg.setAttribute('viewBox', viewboxes[stateIdx]);
        cursorG.setAttribute('transform', transforms[stateIdx]);
        cursorPath.setAttribute('d', paths[stateIdx]);
      }, 200);
    }
    clearTimeout(mouseMoveTimer);
    mouseMoveTimer = setTimeout(() => {
      mouseMoving = false;
      clearInterval(cursorSnipInterval);
      cursorSnipInterval = null;
      stateIdx = 0;
      cursorSvg.setAttribute('viewBox', viewboxes[0]);
      cursorG.setAttribute('transform', transforms[0]);
      cursorPath.setAttribute('d', paths[0]);
    }, 150);
  });

  document.addEventListener('mouseleave', () => { cursor.style.opacity = '0'; lastX = null; lastY = null; });
  document.addEventListener('mouseenter', () => { cursor.style.opacity = '1'; });
  document.addEventListener('click', e => { if (!e.target.closest('a')) spawnConfetti(e.clientX, e.clientY); });

  function spawnConfetti(x, y) {
    const colors = ['#62385e','#4e2c4f','#ebdb43','#9b55bb','#EDE0D4','#9b6a96','#b06fd4'];
    for (let i = 0; i < 36; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      const size = 8 + Math.random() * 14;
      el.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};pointer-events:none;`;
      document.body.appendChild(el);
      const angle = Math.random() * Math.PI * 2;
      const dist = 80 + Math.random() * 220;
      el.animate([
        {transform:'translate(0,0) rotate(0deg)',opacity:1},
        {transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) rotate(${Math.random()*540}deg)`,opacity:0}
      ], {duration:700+Math.random()*500,easing:'ease-out'}).onfinish = () => el.remove();
    }
  }

  let scissorIdx = 0;
  setInterval(() => {
    scissorIdx = (scissorIdx+1) % states.length;
    states.forEach((s,i) => s.style.opacity = i === scissorIdx ? '1' : '0');
  }, 220);

  function reveal() {
    const stage = document.getElementById('stage');
    const left = document.createElement('div');
    const right = document.createElement('div');
    left.style.cssText = 'position:absolute;left:0;top:0;width:50%;height:100%;background:#EDE0D4;z-index:12;';
    right.style.cssText = 'position:absolute;right:0;top:0;width:50%;height:100%;background:#EDE0D4;z-index:12;';
    paper.style.display = 'none';
    cutLine.style.display = 'none';
    stage.appendChild(left);
    stage.appendChild(right);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      left.style.transition = 'transform 0.9s cubic-bezier(0.7,0,0.2,1)';
      right.style.transition = 'transform 0.9s cubic-bezier(0.7,0,0.2,1)';
      left.style.transform = 'translateX(-110vw)';
      right.style.transform = 'translateX(110vw)';
      progress.style.opacity = '0';
      brand.style.transition = 'opacity 0.7s ease 0.3s';
      brand.style.opacity = '1';

      // Confetti burst when logo appears
      setTimeout(() => {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        spawnConfetti(cx, cy);
        spawnConfetti(cx - 120, cy + 40);
        spawnConfetti(cx + 120, cy + 40);
      }, 500);

      // Fast fade to homepage
      setTimeout(() => {
        document.body.style.transition = 'opacity 0.5s';
        document.body.style.opacity = '0';
      }, 15000);
      setTimeout(() => {
        window.location.href = 'homepage.html';
      }, 15500);
    }));
  }

  function runAnimation() {
    const totalDuration = 3500;
    const startTime = performance.now();
    const screenH = window.innerHeight;
    function step(now) {
      const pct = Math.min((now - startTime) / totalDuration, 1);
      const eased = pct < 0.5 ? 2*pct*pct : -1+(4-2*pct)*pct;
      const scissorBottom = -160 + (screenH + 200) * eased;
      scissorsWrap.style.bottom = scissorBottom + 'px';
      cutLine.style.height = Math.max(0, scissorBottom + 52) + 'px';
      if (pct < 1) { requestAnimationFrame(step); }
      else {
        scissorsWrap.style.transition = 'opacity 0.2s';
        scissorsWrap.style.opacity = '0';
        setTimeout(reveal, 200);
      }
    }
    requestAnimationFrame(step);
  }

  document.addEventListener('DOMContentLoaded', runAnimation);
</script>
